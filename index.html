<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body class="bg-light style-override" style="display: none;">

<div class="container-fluid py-3 px-4 bg-white shadow-sm mb-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
        
        <div>
            <span class="text-uppercase text-muted fw-bold tracking-wider" style="letter-spacing: 1px; font-size: 0.75rem;">ASSIGNMENT-15</span>
            <h1 class="h3 mb-0 fw-bold text-dark">Student Management</h1>
        </div>

        <div class="d-flex gap-3 align-items-center mt-3 mt-md-0 ms-auto">
            <button onclick="openAddPage()" class="btn btn-custom-add d-flex align-items-center gap-2">
                <i class="fa-solid fa-circle-plus fs-5"></i>
                <span>Add New Student</span>
            </button>
            
            <button onclick="handleLogout()" class="btn btn-custom-logout d-flex align-items-center gap-2">
                <i class="fa-solid fa-power-off"></i>
                <span>Logout</span>
            </button>
        </div>

    </div>
</div>

<div class="hero-band">
    <div>
        <div class="hero-title">Student<br><em>Details</em></div>
    </div>
    <div class="hero-stat">
        <div class="hero-stat-num" id="statTotal">—</div>
        <div class="hero-stat-label">Total Students</div>
    </div>
</div>

<div class="content">
    <div class="section-head">
        <div class="section-title">All Students</div>
        <span class="section-count" id="sectionCount">Loading…</span>
    </div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Roll No</th>
                    <th>Course</th>
                    <th>City</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <tr>
                    <td colspan="7">
                        <div class="empty-state">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                            <p>Loading records…</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
