<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center style-override" style="min-height: 100vh;">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 12px;">
        <h3 class="text-center mb-4 fw-bold text-dark">User Login</h3>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="loginEmail" class="form-label text-secondary small fw-bold">EMAIL ADDRESS</label>
                <input type="email" id="loginEmail" class="form-control form-control-lg bg-light" placeholder="name@company.com" required>
            </div>
            
            <div class="mb-4">
                <label for="loginPassword" class="form-label text-secondary small fw-bold">PASSWORD</label>
                <input type="password" id="loginPassword" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 btn-lg py-2 fw-bold mb-3" style="background-color: #2e5b4e; border: none;">Sign In</button>
        </form>
        
        <div class="text-center small mt-2 text-muted">
            Don't have an account? <a href="register.html" class="text-decoration-none fw-bold" style="color: #2e5b4e;">Register here</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
